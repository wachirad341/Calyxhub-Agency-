<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace Church</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#0f172a;color:#fff}
header{background:url('https://images.unsplash.com/photo-1507692049790-de58290a4334') center/cover;height:60vh;display:flex;align-items:center;justify-content:center;text-align:center}
section{padding:40px 20px;text-align:center}
.card{background:#1e293b;padding:20px;border-radius:12px;margin:10px}
input,textarea{width:90%;padding:10px;margin:10px;border-radius:8px;border:none}
button{padding:10px 20px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<header><div><h1>Grace Church</h1><p>Welcome Home</p></div></header>
<section>
<h2>Service Times</h2>
<div class="card">Sunday: 9AM & 11AM</div>
</section>
<section>
<h2>Contact Us</h2>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea placeholder="Your Message"></textarea>
<button>Send Message</button>
</section>
</body>
</html>
